# OTA Platform — Docker stack (app + Postgres + Redis)
# VPS: cp deploy/docker/env.production.example .env → sửa → docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ota
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota -d ota"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ota-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ota:
    build: .
    image: ota-platform:latest
    container_name: ota-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ota:${POSTGRES_PASSWORD}@postgres:5432/ota
      REDIS_URL: redis://redis:6379/0
    volumes:
      - appdata:/app/backend/data
    shm_size: "512mb"

volumes:
  pgdata:
  redisdata:
  appdata:
