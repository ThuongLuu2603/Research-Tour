# OTA Platform — Nginx config
# Render từ template: {{DOMAIN}} → tên domain thực tế
# Vị trí: /etc/nginx/sites-available/ota → symlink sang sites-enabled/

upstream ota_backend {
    server unix:/var/www/ota/backend/ota.sock fail_timeout=0;
    keepalive 16;
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name {{DOMAIN}};

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS main server
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{DOMAIN}};

    # SSL — certbot tự manage
    ssl_certificate     /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ─── Upload limit (Excel import) ─────────────────────────────────────────
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_body_timeout 120s;

    # ─── Frontend static (React/Vite build) ──────────────────────────────────
    root /var/www/ota/frontend/dist;
    index index.html;

    # Assets với hash (vite tự sinh) — cache vĩnh viễn
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Favicon + icons
    location ~* \.(?:ico|jpg|jpeg|png|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback — mọi route không match file → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";  # index.html không cache (entry point luôn fresh)
    }

    # ─── Backend API ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ota_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout: tour sync có thể chạy lâu — 3 phút
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;

        # SSE/streaming (sync progress) — tắt buffer
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
    }

    # ─── Health check (cho uptime monitor) ───────────────────────────────────
    location = /healthz {
        access_log off;
        proxy_pass http://ota_backend/health;
        proxy_set_header Host $host;
    }

    # ─── Bảo vệ dotfiles ─────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
